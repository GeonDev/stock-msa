server:
  port: 8085

spring:
  application:
    name: stock-ai
  config:
    import: "optional:file:.env[.properties]"
  
  # DB Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
  
  # Spring AI
  ai:
    vertex:
      ai:
        gemini:
          project-id: ${GOOGLE_CLOUD_PROJECT_ID}
          location: ${GOOGLE_CLOUD_LOCATION:us-central1}
          chat:
            options:
              model: gemini-1.5-flash
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE
        dimensions: 768

  # Datasource
  datasource:
    url: ${STOCK_AI_DB_URL:jdbc:postgresql://localhost:5435/stock_ai?useSSL=false}
    username: ${AI_DB_USER:ai_user}
    password: ${AI_DB_PASSWORD:ai_pass}
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    chat-id: ${TELEGRAM_CHAT_ID}
    name: ${TELEGRAM_BOT_NAME:StockMsaBot}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: local
  eureka:
    client:
      enabled: false

services:
  stock-finance:
    url: http://localhost:8082
  stock-corp:
    url: http://localhost:8081

---
spring:
  config:
    activate:
      on-profile: prod

services:
  stock-finance:
    url: http://stock-finance:8082
  stock-corp:
    url: http://stock-corp:8081

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASSWORD:1234}@stock-discovery:8761/eureka
